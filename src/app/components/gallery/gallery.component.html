<section id="gallery">
  <div class="container">
    <div class="section-header centered">
      <span class="section-label">Portfolio</span>
      <h2 class="section-title">Before & After <strong>Gallery</strong></h2>
      <p class="section-sub">The proof is in the detail. Explore our work across a range of aircraft types and services.</p>
    </div>

    <div class="gallery-tabs">
      <button
        *ngFor="let f of filters"
        class="tab-btn"
        [class.active]="activeFilter === f.key"
        (click)="setFilter(f.key)">
        {{ f.label }}
      </button>
    </div>

    <div class="gallery-grid">
      <div
        *ngFor="let item of filteredItems"
        class="gallery-item"
        [class.tall]="item.tall">

   <ng-container *ngIf="item.type === 'before-after'">
  <div class="ba-slider" (mousedown)="startDrag($event)" (touchstart)="startDragTouch($event)">
    <img [src]="item.afterImage" alt="After" class="ba-after-img" />
    <div class="ba-before" [style.width.%]="sliderPercent">
      <img [src]="item.beforeImage" alt="Before" class="ba-before-img" />
    </div>
    <div class="ba-handle" [style.left.%]="sliderPercent">
      <div class="ba-handle-line"></div>
      <div class="ba-handle-circle">↔</div>
      <div class="ba-handle-line"></div>
    </div>
    <div class="ba-label-before">BEFORE</div>
    <div class="ba-label-after">AFTER</div>
  </div>
</ng-container>

        <ng-container *ngIf="item.type === 'solid'">
          <div class="gallery-solid" [style.background]="item.color">
            <div class="big-icon">{{ item.icon }}</div>
            <div>{{ item.title }}</div>
          </div>
        </ng-container>

        <div class="gallery-overlay">
          <div class="gallery-overlay-text">
            <strong>{{ item.title }}</strong>
            {{ item.subtitle }}
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
